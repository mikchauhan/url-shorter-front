<div
  class="min-h-screen overflow-y-auto bg-gradient-to-b from-gray-100 to-gray-200 flex items-center justify-center px-4 py-6 sm:px-6">

  <!-- Toast -->
  <div
    *ngIf="showToast"
    class="fixed top-4 right-4 sm:top-6 sm:right-6 z-50 px-4 py-3 sm:px-6 rounded-xl shadow-lg text-white
           animate-[slideInRight_0.3s_ease-out]"
    [ngClass]="{
      'bg-green-500': toastType === 'success',
      'bg-red-500': toastType === 'error'
    }">
    {{ toastMessage }}
  </div>

  <!-- Card -->
  <div
    class="bg-white w-full max-w-md sm:max-w-lg rounded-2xl shadow-xl p-6 sm:p-8 space-y-6">

    <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 text-center">
      🔗 URL Shortener
    </h1>

    <p class="text-gray-500 text-center text-sm sm:text-base">
      Shorten your links quickly and track clicks.
    </p>

    <!-- URL input -->
    <input
      [(ngModel)]="originalUrl"
      placeholder="Enter your long URL"
      class="w-full px-4 sm:px-5 py-3 border border-gray-300 rounded-xl
             focus:outline-none focus:ring-2 focus:ring-indigo-500" />

    <!-- Alias + Days -->
    <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
      <input
        [(ngModel)]="customAlias"
        placeholder="Alias (optional)"
        class="w-full sm:flex-1 px-4 py-2 border border-gray-300 rounded-xl
               focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" />

      <input
        type="number"
        [(ngModel)]="expiresInDays"
        placeholder="Days"
        min="1"
        class="w-full sm:w-24 px-4 py-2 border border-gray-300 rounded-xl
               focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" />
    </div>

    <!-- Button -->
    <button
      (click)="shortenUrl()"
      [disabled]="loading"
      class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-500
             text-white font-semibold shadow-lg hover:from-indigo-600 hover:to-purple-600
             transition-all flex items-center justify-center">

      <svg
        *ngIf="loading"
        class="animate-spin h-5 w-5 mr-2 text-white"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10"
                stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8v8H4z"></path>
      </svg>

      {{ loading ? 'Shortening...' : 'Shorten URL' }}
    </button>

    <!-- Error -->
    <p *ngIf="error" class="text-red-500 text-center font-medium text-sm">
      {{ error }}
    </p>

    <!-- Result -->
    <div
      *ngIf="shortUrl"
      class="bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-inner space-y-2">

      <p class="text-gray-600 text-center font-medium">
        Your short URL:
      </p>

      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
        <a
          [href]="shortUrl"
          target="_blank"
          class="text-indigo-600 font-semibold truncate underline text-center sm:text-left">
          {{ shortUrl }}
        </a>

        <button
          (click)="copyToClipboard()"
          class="px-4 py-2 bg-indigo-500 text-white rounded-xl
                 hover:bg-indigo-600 transition w-full sm:w-auto">
          Copy
        </button>
      </div>

      <p class="text-gray-400 text-sm text-center">
                Expires on: {{ expiresOnText | countdown }} 

      </p>
    </div>

  </div>
</div>
